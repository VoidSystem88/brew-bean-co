<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - BeanTrack Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
        .container {
            background: #2d2d2d;
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .dino-icon {
            font-size: 80px;
            display: block;
            margin-bottom: 16px;
        }
        .title {
            font-size: 24px;
            font-weight: 700;
            color: #f5c842;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .retry-btn {
            background: #6F4E37;
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 8px;
        }
        .retry-btn:hover {
            background: #5d3e2a;
            transform: scale(1.05);
        }
        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4757;
            margin-right: 8px;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .tips {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #444;
            text-align: left;
            font-size: 13px;
            color: #888;
        }
        .tips li {
            list-style: none;
            padding: 4px 0;
        }
        .tips li::before {
            content: "• ";
            color: #f5c842;
        }
        .coffee-icon {
            font-size: 36px;
            display: block;
            margin-top: 16px;
        }
        .badge-offline {
            background: #ff4757;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="dino-icon">🦕</span>
        <div class="title">
            <span class="badge-offline">📡 OFFLINE</span>
            <br>
            No Internet Connection
        </div>
        <p class="subtitle">
            <span class="status-dot"></span>
            You are currently offline
        </p>
        
        <div style="background: #3d3d3d; border-radius: 12px; padding: 16px; margin: 16px 0;">
            <span style="font-size: 20px;">☕</span>
            <p style="color: #ccc; font-size: 14px; margin-top: 4px;">
                Don't worry! Your orders will be saved locally<br>
                and synced when you're back online.
            </p>
        </div>

        <button class="retry-btn" onclick="tryReconnect()">
            <i class="fas fa-sync"></i> Try Again
        </button>

        <div class="tips">
            <strong style="color: #aaa;">💡 Tips while offline:</strong>
            <li>All sales will be saved as pending</li>
            <li>Barista queue still works</li>
            <li>Data will auto-sync when online</li>
        </div>

        <span class="coffee-icon">☕</span>
    </div>

    <script>
        function tryReconnect() {
            location.reload();
        }

        // Auto retry every 30 seconds
        setTimeout(() => {
            location.reload();
        }, 30000);

        // Detect when online again
        window.addEventListener('online', () => {
            location.reload();
        });
    </script>
</body>
</html>
